version: 2
registries:
  # Define custom registries if needed (e.g., private NuGet feeds)
  # For public NuGet, default is used automatically
updates:
  # Configuration for NuGet packages
  - package-ecosystem: "nuget"
    directory: "/"
    # Check for updates weekly to reduce noise
    schedule:
      interval: "weekly"
      day: "monday"
    # Limit the number of open PRs to avoid spam
    open-pull-requests-limit: 10
    # Group minor and patch updates together
    groups:
      nuget-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      # Keep major updates separate for manual review
      nuget-major:
        patterns:
          - "*"
        update-types:
          - "major"
    # Assign reviewers automatically
    reviewers:
      - "itzkitb" # Whats my name on github XD
    # Add labels for easier filtering
    labels:
      - "dependencies"
      - "nuget"
    # Commit message prefix
    commit-message:
      prefix: "deps"
      include: "scope"
